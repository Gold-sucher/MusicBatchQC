<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>QC Viewer</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
      background-color: #f4f4f4;
    }

    .image-container {
      position: relative;
      display: inline-block;
      width: 100%;
      max-width: 100%;
      border: 1px solid #ccc;
      background-color: #000;
    }

    .green-line {
      position: absolute;
      left: 0;
      width: 100%;
      height: 2px;
      background-color: #00ff00; /* Leuchtendes Grün */
      pointer-events: none; /* Klicks gehen durch die Linie hindurch */
      z-index: 10;
      /* Berechnung: (200px / 1208px) * 100 = 16.556% */
      top: 16.56%; 
      box-shadow: 0 0 5px rgba(0, 255, 0, 0.8);
    }

    .spectrum-img {
      display: block;
      width: 100%;
      height: auto;
    }

    .info-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    .info-table td {
      padding: 8px;
      border: 1px solid #ddd;
      background-color: #fff;
    }

    .controls {
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 15px;
      cursor: pointer;
      font-weight: bold;
    }

    button[value="ok"] { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    button[value="bad"] { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    button[value="skip"] { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
  </style>
</head>
<body>
  <h2>{{ info.FileName }}</h2>
  <p><strong>Verbleibende Dateien:</strong> {{ remaining }}</p>

  <div style="display:flex; align-items:flex-start; gap: 20px;">
    <div style="flex: 2;">
      {% if spectrum_file %}
        <div class="image-container">
          <div class="green-line"></div>
          <img src="{{ url_for('spectrum', filename=spectrum_file) }}" class="spectrum-img">
        </div>
      {% else %}
        <div style="padding: 50px; border: 1px dashed #ccc; text-align: center;">
          <p>Kein Spektrogramm verfügbar</p>
        </div>
      {% endif %}
    </div>

<div style="flex: 1;">
  <table class="info-table">
    {% for key, value in info.items() %}
      {% if key not in ['FilePath', 'SpectrumPath'] %}
      <tr>
        <td><strong>{{ key }}</strong></td>
        <td>{{ value }}</td>
      </tr>
      {% endif %}
    {% endfor %}
  </table>
</div>

      <form method="post" action="{{ url_for('action') }}">
        <div class="controls">
          <button type="submit" name="action" value="ok">Weiter (OK)</button>
          <button type="submit" name="action" value="bad">Schlecht</button>
          <button type="submit" name="action" value="skip">Überspringen</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
