<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>QC Viewer</title>
</head>
<body>
  <h2>{{ info.FileName }}</h2>
  <p><strong>Verbleibende Dateien:</strong> {{ remaining }}</p>
  <div style="display:flex; align-items:flex-start;">
    <div style="flex:1;">
      {% if spectrum_file %}
        <img src="{{ url_for('spectrum', filename=spectrum_file) }}" style="max-width:100%;">
      {% else %}
        <p>Kein Spektrogramm verfügbar</p>
      {% endif %}
    </div>
    <div style="flex:1; padding-left:20px;">
      <table border="1" cellpadding="5" cellspacing="0">
        {% for key, value in info.items() %}
        <tr>
          <td><strong>{{ key }}</strong></td>
          <td>{{ value }}</td>
        </tr>
        {% endfor %}
      </table>
      <form method="post" action="{{ url_for('action') }}" style="margin-top:10px;">
        <button type="submit" name="action" value="ok">Weiter (OK)</button>
        <button type="submit" name="action" value="bad">Als schlecht markieren</button>
        <button type="submit" name="action" value="skip">Überspringen</button>
      </form>
    </div>
  </div>
</body>
</html>
